<script>
const DL_URL = 'https://speed.cloudflare.com/__down?bytes=100000000';
const UL_URL = 'https://speed.cloudflare.com/__up';

const auraCanvas = document.getElementById('aura-canvas');
const ctx        = auraCanvas.getContext('2d');
const gokuImg    = document.getElementById('goku-img');
const dlVal      = document.getElementById('dl-val');
const ulVal      = document.getElementById('ul-val');
const pingVal    = document.getElementById('ping-val');
const jitterVal  = document.getElementById('jitter-val');
const progressBar= document.getElementById('progress-bar');
const statusEl   = document.getElementById('status');
const startBtn   = document.getElementById('start-btn');
const dirBadge   = document.getElementById('dir-badge');
const formLabel  = document.getElementById('form-label');
const dlRank     = document.getElementById('dl-rank');
const ulRank     = document.getElementById('ul-rank');
const resultsPanel = document.getElementById('results-panel');
const resultsGrid  = document.getElementById('results-grid');
const healthScore  = document.getElementById('health-score');
const healthTags   = document.getElementById('health-tags');
const healthRec    = document.getElementById('health-rec');
const shareBtn     = document.getElementById('share-btn');

function setStatus(m)  { statusEl.textContent = m; }
function setProgress(p){ progressBar.style.width = p + '%'; }

function setRank(el, mbps) {
  const form = getForm(mbps);
  el.textContent  = form.name === '—' ? '' : form.name;
  el.style.color  = LABEL_COLORS[form.name] || '#94a3b8';
}

// ── Browser / OS detection ────────────────────────────────────────────────────
function getBrowser() {
  const ua = navigator.userAgent;
  if (ua.includes('Firefox/')) return 'Firefox';
  if (ua.includes('Edg/')) return 'Edge';
  if (ua.includes('OPR/') || ua.includes('Opera/')) return 'Opera';
  if (ua.includes('Chrome/') && !ua.includes('Edg/')) return 'Chrome';
  if (ua.includes('Safari/') && !ua.includes('Chrome/')) return 'Safari';
  return 'Unknown';
}

function getOS() {
  const ua = navigator.userAgent;
  if (ua.includes('Win')) return 'Windows';
  if (ua.includes('Mac')) return 'macOS';
  if (ua.includes('Linux')) return 'Linux';
  if (ua.includes('Android')) return 'Android';
  if (ua.includes('iPhone') || ua.includes('iPad')) return 'iOS';
  return 'Unknown';
}

// ── IP + ISP detection ────────────────────────────────────────────────────────
async function getIPInfo() {
  try {
    const res = await fetch('https://ipinfo.io/json?token=');
    if (!res.ok) throw new Error();
    const data = await res.json();
    return { ip: data.ip || '—', isp: data.org || '—', region: data.city ? `${data.city}, ${data.region}` : '—' };
  } catch(e) {
    try {
      const res2 = await fetch('https://api.ipify.org?format=json');
      const data2 = await res2.json();
      return { ip: data2.ip || '—', isp: '—', region: '—' };
    } catch(e2) {
      return { ip: '—', isp: '—', region: '—' };
    }
  }
}

// ── Jitter measurement (variance in ping times) ───────────────────────────────
async function measurePingAndJitter() {
  const runs = 6;
  const times = [];
  for (let i = 0; i < runs; i++) {
    const t0 = performance.now();
    try { await fetch('https://speed.cloudflare.com/__down?bytes=1', { cache: 'no-store' }); } catch(e) {}
    times.push(performance.now() - t0);
  }
  const avg = times.reduce((a,b) => a+b, 0) / times.length;
  // Jitter = average absolute deviation from the mean
  const jitter = times.reduce((a, t) => a + Math.abs(t - avg), 0) / times.length;
  return { ping: Math.round(avg), jitter: Math.round(jitter) };
}

// ── Internet Health Score ─────────────────────────────────────────────────────
function computeHealth(dl, ul, ping, jitter) {
  // Score 0–100 based on weighted components
  let score = 100;
  // Download: 100 Mbps+ = perfect, below 5 is bad
  if (dl < 5) score -= 30; else if (dl < 15) score -= 15; else if (dl < 50) score -= 5;
  // Upload: 20 Mbps+ = perfect
  if (ul < 2) score -= 25; else if (ul < 10) score -= 10; else if (ul < 20) score -= 3;
  // Ping: under 20 = perfect, over 100 = bad
  if (ping > 100) score -= 20; else if (ping > 50) score -= 10; else if (ping > 30) score -= 5;
  // Jitter: under 5 = perfect, over 30 = bad
  if (jitter > 30) score -= 15; else if (jitter > 15) score -= 8; else if (jitter > 5) score -= 3;
  return Math.max(0, Math.min(100, score));
}

function getHealthColor(score) {
  if (score >= 85) return '#34d399';
  if (score >= 60) return '#fbbf24';
  return '#f87171';
}

function getSuitableTags(dl, ul, ping) {
  const tags = [];
  if (dl >= 25 && ping < 60) tags.push('4K Streaming');
  if (dl >= 5) tags.push('HD Streaming');
  if (ping < 40 && dl >= 15) tags.push('Gaming');
  if (dl >= 5 && ul >= 3 && ping < 80) tags.push('Video Calls');
  if (dl >= 50) tags.push('Large Downloads');
  if (dl >= 10 && ul >= 5 && ping < 60) tags.push('Remote Work');
  if (dl >= 100 && ul >= 50) tags.push('Power User');
  return tags;
}

function getRecommendations(dl, ul, ping, jitter) {
  const recs = [];
  if (ping < 20) recs.push('Your latency is excellent for gaming.');
  else if (ping > 80) recs.push('High latency — gaming and video calls may suffer.');
  if (jitter > 20) recs.push('Jitter is elevated — connection may feel inconsistent.');
  else if (jitter < 5) recs.push('Very low jitter — stable connection.');
  if (ul < 5) recs.push('Upload speed is lower than expected for video conferencing.');
  if (dl >= 100) recs.push('Download speed is excellent for all activities.');
  else if (dl < 10) recs.push('Download speed may be too slow for 4K streaming.');
  if (dl >= 25 && ul >= 10 && ping < 40) recs.push('Your connection is ideal for video conferencing.');
  return recs;
}

function showResults(dl, ul, ping, jitter, duration, ipInfo) {
  // Populate results grid
  const items = [
    ['Jitter', jitter + ' ms'],
    ['Public IP', ipInfo.ip],
    ['ISP', ipInfo.isp],
    ['Region', ipInfo.region],
    ['Browser', getBrowser()],
    ['OS', getOS()],
    ['Test Server', 'Cloudflare CDN'],
    ['Duration', duration.toFixed(1) + 's'],
  ];
  resultsGrid.innerHTML = items.map(([k,v]) =>
    `<div class="result-item"><span class="result-key">${k}</span><span class="result-val">${v}</span></div>`
  ).join('');

  // Health score
  const score = computeHealth(dl, ul, ping, jitter);
  healthScore.textContent = score + '/100';
  healthScore.style.color = getHealthColor(score);

  // Tags
  const tags = getSuitableTags(dl, ul, ping);
  healthTags.innerHTML = tags.map(t => `<span class="health-tag">${t}</span>`).join('');

  // Recommendations
  const recs = getRecommendations(dl, ul, ping, jitter);
  healthRec.innerHTML = recs.map(r => `<p>• ${r}</p>`).join('');

  resultsPanel.classList.add('visible');
  shareBtn.classList.add('visible');
}

// Share / copy results
shareBtn.addEventListener('click', () => {
  const text = `🚀 My Internet Speed (howfastismy.net)\n` +
    `Download: ${dlVal.textContent} Mbps\n` +
    `Upload: ${ulVal.textContent} Mbps\n` +
    `Ping: ${pingVal.textContent} ms\n` +
    `Health: ${healthScore.textContent}`;
  navigator.clipboard.writeText(text).then(() => {
    shareBtn.textContent = '✓ Copied!';
    setTimeout(() => { shareBtn.textContent = '📋 COPY RESULTS'; }, 2000);
  }).catch(() => {
    shareBtn.textContent = '⚠ Copy failed';
    setTimeout(() => { shareBtn.textContent = '📋 COPY RESULTS'; }, 2000);
  });
});

function resizeCanvas() {
  const r = auraCanvas.parentElement.getBoundingClientRect();
  auraCanvas.width = r.width; auraCanvas.height = r.height;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

const CW  = () => auraCanvas.width;
const CH  = () => auraCanvas.height;
const CCX = () => CW() * 0.5;
const CCY = () => CH() * 0.5;

// ── Power forms ───────────────────────────────────────────────────────────────
const FORMS = [
  { name: '—',               minMbps: 0,
    aura: null, rings: 0, lightning: false,
    imgFilter: 'none' },
  { name: 'KAIOKEN',         minMbps: 1,
    aura: ['#ff3300','#ff6600','#ff1100'], rings: 1, lightning: false,
    imgFilter: 'drop-shadow(0 0 10px #ff4400) drop-shadow(0 0 4px #ff0000)' },
  { name: 'SUPER SAIYAN',    minMbps: 20,
    aura: ['#ffe600','#ffaa00','#fff4aa'], rings: 2, lightning: true,
    imgFilter: 'hue-rotate(40deg) saturate(4) brightness(1.4) drop-shadow(0 0 14px #ffe600) drop-shadow(0 0 28px #ffaa00)' },
  { name: 'SUPER SAIYAN 2',  minMbps: 80,
    aura: ['#ffffff','#ffe600','#ffdd44'], rings: 3, lightning: true,
    imgFilter: 'hue-rotate(40deg) saturate(2) brightness(2.4) drop-shadow(0 0 18px #fff) drop-shadow(0 0 36px #ffe600)' },
  { name: 'SUPER SAIYAN BLUE', minMbps: 200,
    aura: ['#00cfff','#0077ff','#aaddff'], rings: 3, lightning: true,
    imgFilter: 'hue-rotate(200deg) saturate(4) brightness(1.5) drop-shadow(0 0 18px #00cfff) drop-shadow(0 0 36px #0055ff)' },
  { name: 'ULTRA INSTINCT',  minMbps: 500,
    aura: ['#ffffff','#ccccff','#e8e8ff'], rings: 4, lightning: true,
    imgFilter: 'grayscale(0.5) brightness(2.2) drop-shadow(0 0 22px #fff) drop-shadow(0 0 44px #ccccff)' },
];

function getForm(mbps) {
  let f = FORMS[0];
  for (const form of FORMS) { if (mbps >= form.minMbps) f = form; }
  return f;
}

// ── Particles ─────────────────────────────────────────────────────────────────
class Particle {
  constructor() { this.reset('#ffe600'); }
  reset(color) {
    const a = Math.random() * Math.PI * 2, r = 20 + Math.random() * 30;
    this.x = CCX()+Math.cos(a)*r; this.y = CCY()+Math.sin(a)*r*0.6;
    this.vx=(Math.random()-0.5)*2.5; this.vy=-(1.5+Math.random()*3.5);
    this.life=1; this.decay=0.018+Math.random()*0.022;
    this.size=1.5+Math.random()*2; this.color=color;
  }
  update(color){ this.x+=this.vx; this.y+=this.vy; this.vy-=0.04; this.life-=this.decay; if(this.life<=0)this.reset(color); }
  draw(){ ctx.globalAlpha=Math.max(0,this.life)*0.75; ctx.fillStyle=this.color; ctx.beginPath(); ctx.arc(this.x,this.y,this.size,0,Math.PI*2); ctx.fill(); ctx.globalAlpha=1; }
}
const particles = Array.from({length:55},()=>new Particle());

// ── Lightning ─────────────────────────────────────────────────────────────────
let bolts=[], boltTimer=0;
function spawnBolt(color) {
  const a=Math.random()*Math.PI*2, r0=30+Math.random()*15, len=35+Math.random()*45;
  const pts=[{x:CCX()+Math.cos(a)*r0,y:CCY()+Math.sin(a)*r0*0.6}];
  let cx=pts[0].x,cy=pts[0].y;
  for(let i=0;i<5;i++){cx+=Math.cos(a)*(len/5)+(Math.random()-0.5)*16;cy+=Math.sin(a)*(len/5)+(Math.random()-0.5)*16;pts.push({x:cx,y:cy});}
  bolts.push({pts,life:1,color});
}
function drawBolts(){
  bolts=bolts.filter(b=>b.life>0);
  for(const b of bolts){
    ctx.globalAlpha=b.life*0.85; ctx.strokeStyle=b.color; ctx.lineWidth=1.5;
    ctx.shadowColor=b.color; ctx.shadowBlur=8; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(b.pts[0].x,b.pts[0].y);
    for(let i=1;i<b.pts.length;i++)ctx.lineTo(b.pts[i].x,b.pts[i].y);
    ctx.stroke(); ctx.shadowBlur=0; b.life-=0.1;
  }
  ctx.globalAlpha=1;
}

// ── Aura ──────────────────────────────────────────────────────────────────────
function drawAura(form, t, pulse) {
  if(!form.aura)return;
  const [c1,c2,c3]=form.aura, cx=CCX(), cy=CCY(), baseR=55+pulse*10;
  for(let l=3;l>=1;l--){
    const r=baseR*l*0.75;
    const grd=ctx.createRadialGradient(cx,cy,8,cx,cy,r);
    grd.addColorStop(0,c1+'cc'); grd.addColorStop(0.4,c2+'44'); grd.addColorStop(1,c3+'00');
    ctx.fillStyle=grd; ctx.globalAlpha=0.22/l;
    ctx.beginPath(); ctx.ellipse(cx,cy+10,r*0.65,r,0,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1;
  for(let i=0;i<form.rings;i++){
    const ph=(t*1.4+i/form.rings)%1, rr=baseR*0.4+ph*baseR*1.3, alpha=(1-ph)*0.55;
    ctx.globalAlpha=alpha; ctx.strokeStyle=c1; ctx.lineWidth=2.5-ph*2;
    ctx.shadowColor=c1; ctx.shadowBlur=14;
    ctx.beginPath(); ctx.ellipse(cx,cy+10,rr*0.65,rr,0,0,Math.PI*2); ctx.stroke();
    ctx.shadowBlur=0;
  }
  ctx.globalAlpha=1;
  const core=ctx.createRadialGradient(cx,cy,0,cx,cy,42+pulse*8);
  core.addColorStop(0,c1+'99'); core.addColorStop(0.6,c2+'33'); core.addColorStop(1,c3+'00');
  ctx.fillStyle=core; ctx.globalAlpha=0.55;
  ctx.beginPath(); ctx.ellipse(cx,cy,40+pulse*6,50+pulse*8,0,0,Math.PI*2); ctx.fill();
  ctx.globalAlpha=1;
}

// ── Background ────────────────────────────────────────────────────────────────
function drawBg(form, pulse) {
  ctx.clearRect(0,0,CW(),CH());
  ctx.fillStyle='#000'; ctx.fillRect(0,0,CW(),CH());
  if(!form.aura)return;
  const gy=CH()*0.88;
  ctx.strokeStyle=form.aura[0]; ctx.lineWidth=1; ctx.globalAlpha=0.12+pulse*0.04;
  for(let i=0;i<18;i++){
    const a=(i/18)*Math.PI;
    ctx.beginPath(); ctx.moveTo(CCX(),gy); ctx.lineTo(CCX()+Math.cos(a)*CW()*0.6,gy-Math.sin(a)*CH()*0.7); ctx.stroke();
  }
  ctx.globalAlpha=1;
  const wash=ctx.createRadialGradient(CCX(),CCY(),20,CCX(),CCY(),CW()*0.7);
  wash.addColorStop(0,form.aura[0]+'28'); wash.addColorStop(0.6,form.aura[1]+'10'); wash.addColorStop(1,'#00000000');
  ctx.fillStyle=wash; ctx.globalAlpha=0.85; ctx.fillRect(0,0,CW(),CH()); ctx.globalAlpha=1;
}

// ── Render loop ───────────────────────────────────────────────────────────────
let liveMbps=0, running=false;
let t=0, pulse=0, pulseDir=1;
let curForm=FORMS[0];
let lastNow=null, rafId=null;

const LABEL_COLORS={'—':'#475569','KAIOKEN':'#ff4400','SUPER SAIYAN':'#ffe600',
  'SUPER SAIYAN 2':'#ffffff','SUPER SAIYAN BLUE':'#00aaff','ULTRA INSTINCT':'#ccccff'};

function renderLoop(now) {
  rafId=requestAnimationFrame(renderLoop);
  const dt=lastNow?Math.min((now-lastNow)/1000,0.05):0; lastNow=now;
  t+=dt; pulse+=pulseDir*dt*(1.4+liveMbps/100);
  if(pulse>1){pulse=1;pulseDir=-1;} if(pulse<0){pulse=0;pulseDir=1;}

  // Determine form immediately — CSS transition on the img handles the smooth visual blend
  const newForm=running?getForm(liveMbps):FORMS[0];
  if(newForm!==curForm){
    curForm=newForm;
    gokuImg.style.filter=curForm.imgFilter;
  }

  formLabel.textContent=curForm.name;
  formLabel.style.color=LABEL_COLORS[curForm.name]||'#fff';

  if(running&&curForm.aura){
    const col=curForm.aura[0];
    particles.forEach(p=>p.update(col));
    boltTimer-=dt;
    if(boltTimer<=0&&curForm.lightning){spawnBolt(curForm.aura[0]);spawnBolt(curForm.aura[2]);boltTimer=0.07+Math.random()*0.1;}
  }

  drawBg(curForm,pulse);
  drawAura(curForm,t,pulse);
  if(running&&curForm.aura)particles.forEach(p=>p.draw());
  if(running&&curForm.lightning)drawBolts();
}
rafId=requestAnimationFrame(renderLoop);

// ── Measurement ───────────────────────────────────────────────────────────────

async function measureDownload() {
  liveMbps=0; running=true;
  dirBadge.textContent='↓  DOWNLOAD'; dirBadge.style.color='#60a5fa';
  try {
    const MIN_SECS = 6;
    let totalLoaded = 0, totalSec = 0, round = 0;

    while (true) {
      round++;
      const t0 = performance.now();
      const res = await fetch(DL_URL, {cache:'no-store'});
      const reader = res.body.getReader();
      let loaded=0, lastTick=t0, lastBytes=0;
      while(true){
        const{done,value}=await reader.read(); if(done)break;
        loaded+=value.byteLength; totalLoaded+=value.byteLength;
        const now=performance.now(), el=(now-lastTick)/1000;
        if(el>=0.25){
          liveMbps=((loaded-lastBytes)*8/1e6)/el;
          dlVal.textContent=liveMbps.toFixed(1);
          lastTick=now; lastBytes=loaded;
        }
      }
      totalSec += (performance.now()-t0)/1000;
      // Stop if we've hit the minimum duration
      if (totalSec >= MIN_SECS) break;
    }

    const finalMbps = (totalLoaded*8/1e6)/totalSec;
    running=false; liveMbps=0;
    return finalMbps;
  } catch(e){running=false;liveMbps=0;throw e;}
}

async function measureUpload() {
  liveMbps=0; running=true;
  dirBadge.textContent='↑  UPLOAD'; dirBadge.style.color='#a78bfa';
  const UNIT=65536,REPS=8,CHUNK=UNIT*REPS, buf=new Uint8Array(CHUNK);
  for(let i=0;i<REPS;i++)crypto.getRandomValues(buf.subarray(i*UNIT,(i+1)*UNIT));
  const blob=new Blob([buf]);
  await new Promise(r=>setTimeout(r,30));
  const MIN=6,MAX=15,speeds=[],ts=performance.now();let round=0;
  while(true){
    const el=(performance.now()-ts)/1000;
    if(el>MAX)break; if(el>=MIN&&speeds.length>=4)break;
    round++; setStatus('Testing upload speed…');
    const t0=performance.now();
    try{await fetch(UL_URL,{method:'POST',headers:{'Content-Type':'text/plain'},body:blob,mode:'no-cors'});}
    catch(e){console.warn('Upload round failed:',e);continue;}
    const secs=(performance.now()-t0)/1000;
    speeds.push((CHUNK*8/1e6)/secs);
    liveMbps=speeds.slice(-3).reduce((a,b)=>a+b,0)/Math.min(speeds.length,3);
    ulVal.textContent=liveMbps.toFixed(1);
    await new Promise(r=>setTimeout(r,0));
  }
  running=false; liveMbps=0;
  if(speeds.length===0)return 0;
  const tr=speeds.length>2?speeds.slice(1):speeds;
  return tr.reduce((a,b)=>a+b,0)/tr.length;
}

async function runTest() {
  startBtn.disabled=true;
  dlVal.textContent=ulVal.textContent=pingVal.textContent='–';
  jitterVal.textContent='–';
  dlRank.textContent=ulRank.textContent='';
  resultsPanel.classList.remove('visible');
  shareBtn.classList.remove('visible');
  setProgress(0); running=false; liveMbps=0;

  const testStartTime = performance.now();

  try {
    // 0. Fetch IP info in parallel (non-blocking)
    const ipPromise = getIPInfo();

    // 1. Ping + Jitter
    setStatus('Measuring ping & jitter…'); setProgress(5);
    dirBadge.textContent='PING'; dirBadge.style.color='#34d399';
    const { ping, jitter } = await measurePingAndJitter();
    pingVal.textContent = ping; jitterVal.textContent = jitter; setProgress(15);

    // 2. Download
    setStatus('Testing download speed…');
    const dl = await measureDownload();
    dlVal.textContent = dl.toFixed(1); setRank(dlRank, dl); setProgress(60);
    await new Promise(r=>setTimeout(r,800));

    // 3. Upload
    setStatus('Testing upload speed…'); setProgress(65);
    const ul = await measureUpload();
    ulVal.textContent = ul.toFixed(1); setRank(ulRank, ul); setProgress(100);

    // 4. Done
    const duration = (performance.now() - testStartTime) / 1000;
    const ipInfo = await ipPromise;

    dirBadge.textContent='DONE ✓'; dirBadge.style.color='#34d399';
    setStatus(`Download ${dl.toFixed(1)} Mbps · Upload ${ul.toFixed(1)} Mbps · Ping ${ping} ms`);

    // Show expanded results
    showResults(dl, ul, ping, jitter, duration, ipInfo);

  } catch(err) {
    running=false; liveMbps=0;
    setStatus('⚠ Test failed: '+(err.message||err));
    dirBadge.textContent='ERROR'; dirBadge.style.color='#f87171';
    console.error(err);
  }
  startBtn.disabled=false;
}

startBtn.addEventListener('click', runTest);
</script>
